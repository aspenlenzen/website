<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Aspen Scafa Lenzen — Portfolio</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<meta name="ext-resource-dependency" content="../../components/core/Button.jsx" data-resource-id="srcButton" />
<meta name="ext-resource-dependency" content="../../components/core/RuledHeading.jsx" data-resource-id="srcRuledHeading" />
<meta name="ext-resource-dependency" content="../../components/core/ValueCard.jsx" data-resource-id="srcValueCard" />
<meta name="ext-resource-dependency" content="../../components/navigation/NavBar.jsx" data-resource-id="srcNavBar" />
<meta name="ext-resource-dependency" content="../../components/navigation/Footer.jsx" data-resource-id="srcFooter" />
<meta name="ext-resource-dependency" content="./PhotoPlaceholder.jsx" data-resource-id="srcPhotoPlaceholder" />
<meta name="ext-resource-dependency" content="./Home.jsx" data-resource-id="srcHome" />
<meta name="ext-resource-dependency" content="./Resume.jsx" data-resource-id="srcResume" />
<meta name="ext-resource-dependency" content="./BoPoConsulting.jsx" data-resource-id="srcBoPo" />
<meta name="ext-resource-dependency" content="../../assets/owl_wax_seal.png" data-resource-id="owlSeal" />
<meta name="ext-resource-dependency" content="../../assets/photo_home_field.jpg" data-resource-id="homeField" />
<meta name="ext-resource-dependency" content="../../assets/photo_home_sky.jpg" data-resource-id="homeSky" />
<meta name="ext-resource-dependency" content="../../assets/photo_resume_1.jpg" data-resource-id="resume1" />
<meta name="ext-resource-dependency" content="../../assets/photo_resume_2.jpg" data-resource-id="resume2" />
<style>body{margin:0;background:var(--bg-page);} a{color:var(--link);} a:hover{color:var(--link-hover);}</style>
</head><body>
<template id="__bundler_thumbnail" data-bg-color="#f4efe5">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#f4efe5"/>
    <line x1="360" y1="290" x2="840" y2="290" stroke="#2a331f" stroke-width="4"/>
    <text x="600" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="120" letter-spacing="24" fill="#2a331f">ASL</text>
    <line x1="360" y1="510" x2="840" y2="510" stroke="#2a331f" stroke-width="4"/>
    <circle cx="600" cy="600" r="26" fill="#8f4e2d"/>
  </svg>
</template>
<div id="root"></div>
<script>
const fileIds = [
  "srcButton", "srcRuledHeading", "srcValueCard", "srcNavBar", "srcFooter",
  "srcPhotoPlaceholder", "srcHome", "srcResume", "srcBoPo",
];
const appSrc = `
function App() {
  const [page, setPageRaw] = React.useState("Home");
  const setPage = (p) => { setPageRaw(p); window.scrollTo(0, 0); };
  const Screen = page === "Home" ? Home : page === "Resume" ? Resume : BoPoConsulting;
  const K = { Button, RuledHeading, ValueCard, NavBar, Footer };
  return (
    <div>
      <NavBar brand="Aspen Scafa Lenzen" logoSrc="../../assets/owl_wax_seal.png" links={["Home", "Resume", "BoPo Consulting"]} active={page} onNavigate={setPage} />
      <Screen DS={K} onNavigate={setPage} />
      <Footer />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
`;
const assetMap = {
  "../../assets/owl_wax_seal.png": "owlSeal",
  "../../assets/photo_home_field.jpg": "homeField",
  "../../assets/photo_home_sky.jpg": "homeSky",
  "../../assets/photo_resume_1.jpg": "resume1",
  "../../assets/photo_resume_2.jpg": "resume2",
};
Promise.all(fileIds.map((id) => fetch(window.__resources[id]).then((r) => r.text()))).then((sources) => {
  const clean = (s) => s.replace(/^import .*$/gm, "").replace(/^export /gm, "");
  let src = sources.map(clean).join("\n") + "\n" + appSrc;
  for (const [path, id] of Object.entries(assetMap)) {
    src = src.split(path).join(window.__resources[id]);
  }
  eval(Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code);
});
</script>
</body></html>
