<!-- @dsCard group="Portfolio" viewport="1440x900" subtitle="Home + Resume click-through on the new palette" name="Portfolio site" -->
<!-- @startingPoint section="Screens" subtitle="Personal portfolio: Home + Resume" viewport="1440x900" -->
<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>body{margin:0;background:var(--bg-page);} a{color:var(--link);} a:hover{color:var(--link-hover);}</style>
</head><body>
<div id="root"></div>
<script>
const files = [
  "../../components/core/useIsMobile.jsx",
  "../../components/core/Button.jsx",
  "../../components/core/RuledHeading.jsx",
  "../../components/core/ValueCard.jsx",
  "../../components/navigation/NavBar.jsx",
  "../../components/navigation/Footer.jsx",
  "./PhotoPlaceholder.jsx",
  "./Home.jsx",
  "./Resume.jsx",
  "./caseStudiesData.jsx",
  "./BoPoConsulting.jsx",
];
const appSrc = `

function SkipLink() {
  const [focus, setFocus] = React.useState(false);
  return (
    <a
      href="#main"
      onFocus={() => setFocus(true)}
      onBlur={() => setFocus(false)}
      style={{ position: "absolute", left: focus ? "16px" : "-9999px", top: "16px", zIndex: 1000, background: "var(--ink)", color: "var(--parchment)", padding: "10px 18px", fontFamily: "var(--font-body)", fontSize: "14px", textDecoration: "none" }}
    >
      Skip to main content
    </a>
  );
}
function App() {
  const [page, setPageRaw] = React.useState("Home");
  const setPage = (p) => { setPageRaw(p); window.scrollTo(0, 0); };
  const Screen = page === "Home" ? Home : page === "Resume" ? Resume : BoPoConsulting;
  const K = { Button, RuledHeading, ValueCard, NavBar, Footer };
  return (
    <div>
      <SkipLink />
      <NavBar brand="Aspen Scafa Lenzen" logoSrc="../../assets/owl_wax_seal.png" links={["Home", "Resume", "BoPo Consulting"]} active={page} onNavigate={setPage} />
      <main id="main"><Screen DS={K} onNavigate={setPage} /></main>
      <Footer />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
`;
Promise.all(files.map((f) => fetch(f).then((r) => r.text()))).then((sources) => {
  const clean = (src) => src.replace(/^import .*$/gm, "").replace(/^export /gm, "");
  const src = sources.map(clean).join("\n") + "\n" + appSrc;
  eval(Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code);
});
</script>
</body></html>
