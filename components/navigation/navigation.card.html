<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>body{margin:0;background:var(--bg-page);}</style>
</head><body>
<div id="root"></div>
<script>
const files = [
  "../core/useIsMobile.jsx","./NavBar.jsx", "./Footer.jsx"];
const demoSrc = `
ReactDOM.createRoot(document.getElementById("root")).render(
  <div style={{ display: "flex", flexDirection: "column", gap: "20px" }}>
    <NavBar brand="ASL" links={["Home", "Resume"]} active="Home" style={{ padding: "20px 32px" }} />
    <Footer style={{ padding: "40px 24px" }} />
  </div>
);
`;
Promise.all(files.map((f) => fetch(f).then((r) => r.text()))).then((sources) => {
  const clean = (src) => src.replace(/^import .*$/gm, "").replace(/^export /gm, "");
  const src = sources.map(clean).join("\n") + "\n" + demoSrc;
  eval(Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code);
});
</script>
</body></html>
