<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aspen Scafa Lenzen — Resume</title>
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>body{margin:0;background:var(--bg-page);} a{color:var(--link);} a:hover{color:var(--link-hover);}</style>
</head><body>
<div id="root"></div>
<script>
const files = [
  "components/core/useIsMobile.jsx",
  "components/core/Button.jsx",
  "components/core/RuledHeading.jsx",
  "components/core/ValueCard.jsx",
  "components/navigation/NavBar.jsx",
  "components/navigation/Footer.jsx",
  "ui_kits/portfolio/PhotoPlaceholder.jsx",
  "ui_kits/portfolio/Home.jsx",
  "ui_kits/portfolio/Resume.jsx",
  "ui_kits/portfolio/BoPoConsulting.jsx",
];
const pageFiles = { "Home": "Home.html", "Resume": "Resume.html", "BoPo Consulting": "BoPo Consulting.html" };
const appSrc = `
function App() {
  const setPage = (p) => { window.location.href = encodeURI(pageFiles[p] || pageFiles["Home"]); };
  const K = { Button, RuledHeading, ValueCard, NavBar, Footer };
  return (
    <div>
      <NavBar brand="Aspen Scafa Lenzen" logoSrc="assets/owl_wax_seal.png" links={["Home", "Resume", "BoPo Consulting"]} active="Resume" onNavigate={setPage} />
      <Resume DS={K} onNavigate={setPage} />
      <Footer />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
`;
Promise.all(files.map((f) => fetch(f).then((r) => r.text()))).then((sources) => {
  const clean = (src) => src.replace(/^import .*$/gm, "").replace(/^export /gm, "");
  let src = sources.map(clean).join("\n") + "\n" + appSrc;
  src = src.split("../../assets/").join("assets/");
  eval(Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code);
});
</script>
</body></html>
