<!-- @dsCard group="Spacing" viewport="700x190" subtitle="Airy editorial rhythm; square corners; thin rules" name="Spacing scale" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-page);font-family:var(--font-body);color:var(--text-body);padding:18px 28px;}
.row{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
.bar{height:14px;background:var(--driftwood);}
.l{font-size:12px;width:150px;color:var(--text-heading);font-weight:700;}</style></head>
<body>
<div class="row"><span class="l">space-1 · 8px</span><div class="bar" style="width:8px"></div></div>
<div class="row"><span class="l">space-2 · 16px</span><div class="bar" style="width:16px"></div></div>
<div class="row"><span class="l">space-3 · 24px</span><div class="bar" style="width:24px"></div></div>
<div class="row"><span class="l">space-4 · 40px</span><div class="bar" style="width:40px"></div></div>
<div class="row"><span class="l">space-5 · 64px</span><div class="bar" style="width:64px"></div></div>
<div class="row"><span class="l">space-6 · 104px</span><div class="bar" style="width:104px"></div></div>
<div class="row"><span class="l">section · 160px</span><div class="bar" style="width:160px;background:var(--clay)"></div></div>
</body></html>
