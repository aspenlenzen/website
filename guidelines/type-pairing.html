<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-page);font-family:var(--font-body);display:flex;flex-direction:column;align-items:center;justify-content:center;height:230px;gap:14px;}
.rule{width:420px;border-top:var(--rule-weight) solid var(--border);}
h1{margin:0;font-family:var(--font-display);font-weight:500;font-size:40px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-heading);}
p{margin:0;font-size:14px;color:var(--text-body);max-width:52ch;text-align:center;line-height:1.6;}
.btn{display:inline-block;border:1px solid var(--border);padding:10px 26px;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;color:var(--text-heading);text-decoration:none;}</style></head>
<body>
<div class="rule"></div>
<h1>Into the Field</h1>
<div class="rule"></div>
<p>Elegant serif caps framed by thin rules, grounded by warm humanist body copy — the current site's editorial voice, warmed up for the trail.</p>
<a class="btn" href="#">Resume →</a>
</body></html>
