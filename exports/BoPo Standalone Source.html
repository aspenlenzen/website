<style>body{margin:0;background:var(--bg-page);} a{color:var(--link);} a:hover{color:var(--link-hover);}</style>
<template id="__bundler_thumbnail" data-bg-color="#F7F3EA">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#F7F3EA"/>
    <text x="600" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="120" font-weight="700" letter-spacing="12" fill="#2A331F">BOPO</text>
    <rect x="300" y="440" width="600" height="4" fill="#2A331F"/>
    <text x="600" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="42" letter-spacing="8" fill="#6B6455">CONSULTING</text>
  </svg>
</template>
</head><body>
<div id="root"></div>
<script>
const fileIds = ["f0","f1","f2","f3","f4","f5","f6","f7","f8","f9","f10"];
const pageFiles = { "Home": "index.html", "Resume": "Resume.html", "BoPo Consulting": "BoPo Consulting.html" };
const logoMap = {
  "../../assets/logos/crush-studio.png": "logoCrush",
  "../../assets/logos/atlas.webp": "logoAtlas",
  "../../assets/logos/cantos-dark.png": "logoCantos",
  "../../assets/logos/boom-capital.png": "logoBoom",
  "../../assets/logos/susan-gordon.png": "logoSusan",
  "../../assets/logos/yearly.webp": "logoYearly",
  "../../assets/logos/corcoran.svg": "logoCorcoran",
  "../../assets/logos/togather.png": "logoTogather",
};
const appSrc = `

function SkipLink() {
  const [focus, setFocus] = React.useState(false);
  return (
    <a
      href="#main"
      onFocus={() => setFocus(true)}
      onBlur={() => setFocus(false)}
      style={{ position: "absolute", left: focus ? "16px" : "-9999px", top: "16px", zIndex: 1000, background: "var(--ink)", color: "var(--parchment)", padding: "10px 18px", fontFamily: "var(--font-body)", fontSize: "14px", textDecoration: "none" }}
    >
      Skip to main content
    </a>
  );
}
function App() {
  const setPage = (p) => {};
  const K = { Button, RuledHeading, ValueCard, NavBar, Footer };
  return (
    <div>
      <SkipLink />
      <NavBar brand="Aspen Scafa Lenzen" logoSrc={window.__resources.owl} links={["BoPo Consulting"]} active="BoPo Consulting" onNavigate={setPage} />
      <main id="main"><BoPoConsulting DS={K} onNavigate={setPage} /></main>
      <Footer />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
`;
Promise.all(fileIds.map((id) => fetch(window.__resources[id]).then((r) => r.text()))).then((sources) => {
  const clean = (src) => src.replace(/^import .*$/gm, "").replace(/^export /gm, "");
  let src = sources.map(clean).join("\n") + "\n" + appSrc;
  for (const [path, id] of Object.entries(logoMap)) {
    src = src.split(JSON.stringify(path)).join(JSON.stringify(window.__resources[id]));
  }
  eval(Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code);
});
</script>
</body></html>
