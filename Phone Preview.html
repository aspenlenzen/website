<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Phone Preview</title>
<style>
  body { margin: 0; min-height: 100vh; background: #2a2a26; display: flex; align-items: center; justify-content: center; gap: 48px; padding: 48px 32px 72px; box-sizing: border-box; flex-wrap: wrap; font-family: -apple-system, sans-serif; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .label { color: rgba(255,255,255,0.7); font-size: 14px; letter-spacing: 0.12em; text-transform: uppercase; }
  .phone { width: 390px; height: 780px; background: #000; border-radius: 48px; padding: 14px; box-shadow: 0 24px 60px rgba(0,0,0,0.5); box-sizing: content-box; }
  .screen { width: 100%; height: 100%; border-radius: 36px; overflow: hidden; background: #f4efe5; }
  iframe { width: 100%; height: 100%; border: 0; display: block; }
  .hint { position: fixed; bottom: 16px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.5); font-size: 13px; }
</style>
</head><body>
<div class="col">
  <div class="label">Home</div>
  <div class="phone"><div class="screen"><iframe src="Home.html" title="Home phone preview"></iframe></div></div>
</div>
<div class="col">
  <div class="label">Resume</div>
  <div class="phone"><div class="screen"><iframe src="Resume.html" title="Resume phone preview"></iframe></div></div>
</div>
<div class="col">
  <div class="label">BoPo Consulting</div>
  <div class="phone"><div class="screen"><iframe src="BoPo Consulting.html" title="BoPo Consulting phone preview"></iframe></div></div>
</div>
<div class="hint">Each phone is scrollable and fully interactive.</div>
</body></html>
